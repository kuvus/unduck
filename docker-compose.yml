services:
  unduck:
    build:
      context: .
      args:
        VITE_COPY_URL: ${VITE_COPY_URL:-}
    container_name: unduck
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.unduck.rule=Host(`${TRAEFIK_HOST:?TRAEFIK_HOST is required}`)"
      - "traefik.http.routers.unduck.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.unduck.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
